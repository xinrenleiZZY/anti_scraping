version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: amazon_postgres
    environment:
      POSTGRES_DB: amazon_scraper
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      TZ: Asia/Shanghai
    ports:
      - "5200:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
  backend:
    build: ./backend
    image: amazon-backend:latest
    container_name: amazon_backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://admin:123456@postgres:5432/amazon_scraper
      INPUT_FOLDER: /app/app/scraper/amazon_data
      PROCESSED_DATA_DIR: /app/app/scraper/processed_data
      NAS_SHARE_PATH: /nas
      DISTRIBUTED_MODE: "true"
      TZ: Asia/Shanghai
    volumes:
      - ./backend:/app
      - ./data_control:/data_control
      - //192.168.40.3/钟正洋/amazon_scraper:/nas  # 0421新增 挂载 NAS
    ports:
      - "8888:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    container_name: amazon_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8881:80"
    depends_on:
      - backend
    restart: always