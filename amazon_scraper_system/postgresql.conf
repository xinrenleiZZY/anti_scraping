# 内存配置 (64GB 内存)
shared_buffers = '16GB'                    # 推荐内存的 25%
effective_cache_size = '48GB'              # 推荐内存的 75%
work_mem = '256MB'                         # 排序/哈希操作内存
maintenance_work_mem = '2GB'               # VACUUM/CREATE INDEX 内存

# 查询优化
random_page_cost = 1.1                     # SSD 优化
effective_io_concurrency = 200             # SSD 并发

# 并行查询
max_parallel_workers = 16
max_parallel_workers_per_gather = 4
parallel_setup_cost = 1000
parallel_tuple_cost = 0.1

# 统计信息
default_statistics_target = 1000           # 提高统计精度

# 写入优化
wal_buffers = '64MB'
checkpoint_completion_target = 0.9
max_wal_size = '8GB'
min_wal_size = '2GB'

# 日志 - 记录慢查询
log_min_duration_statement = 1000          # 记录超过1秒的查询
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0

listen_addresses = '*'
port = 5432