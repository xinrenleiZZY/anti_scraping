<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关键词管理 - 汇挚鑫-亚马逊商品排名监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">汇挚鑫-亚马逊商品排名监控系统</h5>
                    <ul class="nav flex-column"></ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1>关键词管理</h1>
                    <span id="api-status" class="badge bg-success">API 在线</span>
                </div>

                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center"><!-- #YU 421 -->
                        <div class="d-flex align-items-center gap-2"><!-- #YU 421 -->
                            <h5 class="mb-0">关键词列表</h5>
                            <!-- #YU 421 -->
                            <select class="form-select form-select-sm" id="filterUser" style="width:150px" onchange="onUserFilter()">
                                <option value="">全部人员</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-danger btn-sm" onclick="openBatchDeleteModal()">
                                <i class="bi bi-trash"></i> 批量删除
                            </button>
                            <button class="btn btn-warning btn-sm" onclick="batchExportKeywords()">
                                <i class="bi bi-download"></i> 批量导出
                            </button>
                            <button class="btn btn-success btn-sm me-2" data-bs-toggle="modal" data-bs-target="#importUserModal"> <!-- #YU 421 -->
                                <i class="bi bi-upload"></i> 批量导入
                            </button>
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#keywordModal">
                                <i class="bi bi-plus"></i> 添加关键词
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-keywords-wrap" style="table-layout:fixed;width:auto;min-width:1100px">
                                <thead>
                                    <tr>
                                        <th style="width:36px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
                                        <th class="tehua">#</th>
                                        <th class="tehua">关键词</th>
                                        <th class="tehua">标签</th>
                                        <th class="tehua">节日</th>
                                        <th class="tehua">大/小节日</th>
                                        <th class="tehua">热卖期</th>
                                        <th class="tehua">负责人</th>
                                        <th class="tehua">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="keywordsTableBody">
                                    <tr><td colspan="9" class="text-center">加载中...</td></tr><!-- #zy 422 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <!-- #YU 421 按人员批量导入模态框 -->
    <div class="modal fade" id="importUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">批量导入关键词（按人员）</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small">
                        Excel 格式：第一行为表头<br>
                        列顺序：关键词 | 负责人 | 标签 | 节日 | 大/小节日 | 热卖期<br>
                        （负责人、标签、节日、大/小节日、热卖期均为选填，支持多个用逗号分隔）
                    </p>
                    <input type="file" class="form-control" id="importUserFile" accept=".xlsx,.xls">
                    <div id="importUserResult" class="mt-2"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="importKeywordsWithUser()">导入</button>
                    <button class="btn btn-secondary btn-sm ms-2" onclick="downloadTemplate()"><i class="bi bi-download"></i> 下载模版</button>
                </div>
            </div>
        </div>
    </div>
    <!-- 添加关键词模态框 -->
    <div class="modal fade" id="keywordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加关键词</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control" id="newKeyword" placeholder="输入关键词，如：pool+party+decorations">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveKeyword">保存</button>
                </div>
            </div>
        </div>
    </div>
    <!-- #YU 421 修改关键词模态框 -->
    <div class="modal fade" id="editKeywordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">修改关键词</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editOldKeyword">
                    <div class="mb-3">
                        <label class="form-label">关键词</label>
                        <input type="text" class="form-control" id="editNewKeyword" placeholder="输入新关键词">
                    </div>
                    <!-- #YU 422 标签编辑 -->
                    <div class="mb-2">
                        <label class="form-label">标签</label>
                        <div id="editTagsList" class="mb-2"></div>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="editNewTag" placeholder="添加标签">
                            <button class="btn btn-outline-primary" onclick="addEditTag()">添加</button>
                        </div>
                    </div>
                    <!-- 新增：节日 -->
                    <div class="mb-2">
                        <label class="form-label">节日</label>
                        <input type="text" class="form-control" id="editFestival" placeholder="例如：春节、中秋节、圣诞节">
                    </div>
                    <!-- 新增：大/小节日 -->
                    <div class="mb-2">
                        <label class="form-label">大/小节日</label>
                        <select class="form-select" id="editFestivalType">
                            <option value="">请选择</option>
                            <option value="大节日">大节日</option>
                            <option value="小节日">小节日</option>
                        </select>
                    </div>
                    <!-- 新增：热卖期 -->
                    <div class="mb-2">
                        <label class="form-label">热卖期</label>
                        <input type="text" class="form-control" id="editHotSeason" placeholder="例如：高峰期、预热期、7-8月、Q4旺季等">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" id="confirmEditKeyword">确认修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- #YU 421 标签管理模态框 -->
    <div class="modal fade" id="tagsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">标签管理 - <span id="tagsModalKw"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="newTag" placeholder="输入标签文本">
                        <button class="btn btn-primary" onclick="addTag()">添加</button>
                    </div>
                    <div id="tagsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 批量删除模态框 -->
    <div class="modal fade" id="batchDeleteModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">批量删除关键词</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-2 mb-3">
                        <div class="col">
                            <select class="form-select form-select-sm" id="bdFilterTag" onchange="renderBatchDeleteList()">
                                <option value="">全部标签</option>
                            </select>
                        </div>
                        <div class="col">
                            <select class="form-select form-select-sm" id="bdFilterOwner" onchange="renderBatchDeleteList()">
                                <option value="">全部负责人</option>
                            </select>
                        </div>
                        <div class="col">
                            <select class="form-select form-select-sm" id="bdFilterFestival" onchange="renderBatchDeleteList()">
                                <option value="">全部节日</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span id="bdKeywordCount" class="text-muted small"></span>
                        <label><input type="checkbox" onchange="bdToggleAll(this)"> 全选</label>
                    </div>
                    <div id="bdKeywordList" style="max-height:400px;overflow-y:auto;border:1px solid #dee2e6;border-radius:4px;padding:8px"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="bdConfirmBtn" onclick="confirmBatchDelete()">确认删除</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script> <!-- #zy 422 -->
    <script src="js/common.js"></script>
    <script src="js/sidebar.js"></script> <!-- #YU 421 -->
    <script src="js/keywords.js"></script>
</body>
</html>
