<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASIN重点监控 - 汇挚鑫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-md-block bg-dark sidebar">
            <div class="position-sticky pt-3">
                <h5 class="text-white text-center py-3">汇挚鑫-亚马逊商品排名监控系统</h5>
                <ul class="nav flex-column"></ul>
            </div>
        </nav>
        <main class="col-md-10 ms-sm-auto px-md-4">
            <div class="d-flex justify-content-between align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1><i class="bi bi-bell text-warning"></i> ASIN 重点监控</h1>
                <button class="btn btn-primary btn-sm" onclick="openAddModal()">
                    <i class="bi bi-plus"></i> 新增监控任务
                </button>
            </div>

            <div id="taskList" class="row g-3">
                <div class="col-12 text-center text-muted py-4">加载中...</div>
            </div>
        </main>
    </div>
</div>

<!-- 新增/编辑 Modal -->
<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="taskModalTitle">新增监控任务</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editTaskId">
                <div class="mb-3">
                    <label class="form-label">ASIN <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="taskAsin" placeholder="例如：B0GFVBV9W7">
                </div>
                <div class="mb-3">
                    <label class="form-label">监控人名称 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="taskMonitorName" placeholder="例如：张三">
                </div>
                <div class="mb-3">
                    <label class="form-label">监控排名类型 <span class="text-danger">*</span></label>
                    <div class="mb-1">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="rankAll" onchange="toggleAllRanks(this)">
                            <label class="form-check-label fw-bold" for="rankAll">全选</label>
                        </div>
                    </div>
                    <div id="rankTypeChecks">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input rank-check" type="checkbox" value="organic_rank" id="r1">
                            <label class="form-check-label" for="r1">自然排名</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input rank-check" type="checkbox" value="ad_rank_sp" id="r2">
                            <label class="form-check-label" for="r2">SP广告排名</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input rank-check" type="checkbox" value="ad_rank_sb" id="r3">
                            <label class="form-check-label" for="r3">SB品牌广告排名</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input rank-check" type="checkbox" value="ad_rank_video" id="r4">
                            <label class="form-check-label" for="r4">视频广告排名</label>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">查询间隔（小时，最少2小时）<span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="taskInterval" min="2" step="0.5" value="4" placeholder="例如：4">
                </div>
                <div class="mb-3">
                    <label class="form-label">分析天数（默认30天）</label>
                    <input type="number" class="form-control" id="taskDays" min="1" value="30">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveTask()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/asin_monitor.js"></script>
</body>
</html>
