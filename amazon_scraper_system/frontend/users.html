<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人员管理 - 汇挚鑫-亚马逊商品排名监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 人员列表 - 固定列宽 */
        .users-table th:nth-child(2),
        .users-table td:nth-child(2) {
            min-width: 120px;
            max-width: 150px;
            width: 130px;
        }

        /* 操作列保持紧凑 */
        .users-table th:last-child,
        .users-table td:last-child {
            white-space: nowrap;
            width: 140px;
        }

        /* 序号列窄一些 */
        .users-table th:first-child,
        .users-table td:first-child {
            width: 60px;
        }

        /* 关键词数列 */
        .users-table th:nth-child(3),
        .users-table td:nth-child(3) {
            width: 100px;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-md-block bg-dark sidebar">
            <div class="position-sticky pt-3">
                <h5 class="text-white text-center py-3">汇挚鑫-亚马逊商品排名监控系统</h5>
                <ul class="nav flex-column"></ul>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1>人员管理</h1>
                <span id="api-status" class="badge bg-success">API 在线</span>
            </div>

            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">人员列表</h5>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddUser()">
                        <i class="bi bi-plus"></i> 添加人员
                    </button>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table users-table">
                            <thead>
                                <tr><th>#</th><th>姓名</th><th>关键词数</th><th>操作</th></tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr><td colspan="4" class="text-center">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- 分页容器 -->
                    <div id="userPaginationContainer" class="mt-3"></div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- 添加/编辑人员 -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalTitle">添加人员</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId">
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-control" id="userName" placeholder="输入姓名">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="saveUser">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 管理关键词 -->
<!-- 管理关键词模态框 - 美化版 -->
<div class="modal fade" id="keywordsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="keywordsModalTitle">
                    <i class="bi bi-tags"></i> 关键词管理
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- 添加关键词区域 -->
                <div class="card mb-3">
                    <div class="card-header bg-light">
                        <i class="bi bi-plus-circle"></i> 添加关键词
                    </div>
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-8">
                                <input type="text" class="form-control" id="newKeyword" placeholder="输入关键词或从下方选择">
                            </div>
                            <div class="col-4">
                                <button class="btn btn-primary w-100" onclick="addKeyword()">
                                    <i class="bi bi-plus"></i> 添加
                                </button>
                            </div>
                        </div>
                        
                        <!-- 已有关键词列表（多选） -->
                        <div class="mt-3">
                            <label class="form-label text-muted small">
                                <i class="bi bi-list-ul"></i> 从已有关键词中选择（可多选）：
                            </label>
                            <div class="border rounded p-2" style="max-height: 200px; overflow-y: auto;" id="availableKeywordsList">
                                <div class="text-center text-muted py-2">加载中...</div>
                            </div>
                            <div class="mt-2">
                                <button class="btn btn-sm btn-outline-success" onclick="batchAddKeywords()">
                                    <i class="bi bi-check2-all"></i> 批量添加选中
                                </button>
                                <span class="text-muted ms-2 small">提示：按住 Ctrl 可多选</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 已有关键词区域 -->
                <div class="card">
                    <div class="card-header bg-light">
                        <i class="bi bi-collection"></i> 已有关键词
                        <span class="badge bg-secondary ms-2" id="keywordCount">0</span>
                    </div>
                    <div class="card-body p-0">
                        <!-- 关键词列表（带分页） -->
                        <div id="currentKeywordsContainer">
                            <div class="text-center text-muted py-3">加载中...</div>
                        </div>
                        <!-- 分页控件 -->
                        <div id="keywordPagination" class="p-3 border-top bg-light" style="display: none;">
                            <nav>
                                <ul class="pagination pagination-sm justify-content-center mb-0" id="keywordPageNav"></ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <i class="bi bi-x-circle"></i> 关闭
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/common.js"></script>
<script src="js/sidebar.js"></script> <!-- #YU 421 -->
<script src="js/users.js"></script>
</body>
</html>
