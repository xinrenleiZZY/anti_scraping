<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爬取控制 - 汇挚鑫-亚马逊商品排名监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">汇挚鑫-亚马逊商品排名监控系统</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
                        <li class="nav-item"><a class="nav-link" href="keywords.html"><i class="bi bi-tags"></i> 关键词管理</a></li>
                        <li class="nav-item"><a class="nav-link active" href="scrape.html"><i class="bi bi-cloud-upload"></i> 爬取控制</a></li>
                        <li class="nav-item"><a class="nav-link" href="data.html"><i class="bi bi-database"></i> 数据查询</a></li>
                        <li class="nav-item"><a class="nav-link" href="tasks.html"><i class="bi bi-list-check"></i> 任务监控</a></li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1>爬取控制</h1>
                    <span id="api-status" class="badge bg-success">API 在线</span>
                </div>

                <div class="row">
                    <!-- 手动爬取 -->
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0"><i class="bi bi-play-fill"></i> 手动爬取</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label">选择关键词</label>
                                    <select class="form-select" id="scrapeKeyword">
                                        <option value="">-- 所有关键词 --</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">页数（留空则自动获取所有页）</label>
                                    <input type="number" class="form-control" id="scrapePages" placeholder="例如: 3">
                                </div>
                                <button class="btn btn-primary w-100" onclick="startScrape()">
                                    <i class="bi bi-cloud-upload"></i> 开始爬取
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 定时任务 -->
                    <div class="col-md-6 mb-4">
                        <div class="card">
                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0"><i class="bi bi-clock-history"></i> 定时任务</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <button class="btn btn-outline-success w-100 mb-2" onclick="triggerDaily()">
                                        <i class="bi bi-calendar-day"></i> 触发每日任务
                                    </button>
                                    <button class="btn btn-outline-success w-100" onclick="triggerWeekly()">
                                        <i class="bi bi-calendar-week"></i> 触发每周任务
                                    </button>
                                </div>
                                <div class="alert alert-info mt-3">
                                    <small>
                                        <i class="bi bi-info-circle"></i> 
                                        每日任务：每天早上9点自动执行<br>
                                        每周任务：每周一早上9点自动执行
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 爬取状态 -->
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5><i class="bi bi-speedometer2"></i> 爬取状态</h5>
                            </div>
                            <div class="card-body">
                                <div id="scrapeStatus" class="text-center text-muted">
                                    等待执行...
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- 在爬取状态卡片后面添加 -->
                    <div class="col-12 mt-4">
                        <div class="card">
                            <div class="card-header bg-dark text-white">
                                <h5 class="mb-0"><i class="bi bi-terminal"></i> 实时日志</h5>
                            </div>
                            <div class="card-body">
                                <div id="log-container" style="height: 300px; overflow-y: auto; background: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 10px; border-radius: 5px;">
                                    <div class="text-muted">等待任务开始...</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/scrape.js"></script>
    <script>
        // WebSocket 连接接收日志
        let ws = null;

        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8888/ws/logs');
            
            ws.onopen = function() {
                console.log('WebSocket 连接已建立');
                addLog('🟢 已连接到日志服务器', 'info');
            };
            
            ws.onmessage = function(event) {
                addLog(event.data, 'log');
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket 错误:', error);
                addLog('🔴 WebSocket 连接错误', 'error');
            };
            
            ws.onclose = function() {
                console.log('WebSocket 连接已关闭');
                // 5秒后重连
                setTimeout(connectWebSocket, 5000);
            };
        }

        function addLog(message, type = 'log') {
            const container = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            
            let color = '#d4d4d4';
            if (message.includes('✅')) color = '#4ec9b0';
            if (message.includes('❌')) color = '#f48771';
            if (message.includes('🚀')) color = '#569cd6';
            if (message.includes('📅')) color = '#ce9178';
            
            logEntry.style.color = color;
            logEntry.style.fontFamily = 'monospace';
            logEntry.style.fontSize = '12px';
            logEntry.style.margin = '2px 0';
            logEntry.innerHTML = `<span style="color: #858585;">[${time}]</span> ${message}`;
            
            container.appendChild(logEntry);
            container.scrollTop = container.scrollHeight;
            
            // 限制日志条数
            while (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }
        }

        // 页面加载时连接 WebSocket
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
        });
        </script>
</body>
</html>
