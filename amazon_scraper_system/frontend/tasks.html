<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务监控 - 汇挚鑫-亚马逊商品排名监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">汇挚鑫-亚马逊商品排名监控系统</h5>
                    <ul class="nav flex-column"></ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1>任务监控</h1>
                    <div>
                        <button class="btn btn-sm btn-primary me-2" onclick="refreshTasks()">
                            <i class="bi bi-arrow-repeat"></i> 刷新
                        </button>
                        <span id="api-status" class="badge bg-success">API 在线</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-md-3">
                                <select class="form-select" id="taskStatusFilter">
                                    <option value="">全部状态</option>
                                    <option value="pending">等待中</option>
                                    <option value="running">运行中</option>
                                    <option value="completed">已完成</option>
                                    <option value="failed">失败</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <input type="text" class="form-control" id="taskKeywordFilter" placeholder="搜索关键词...">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-primary w-100" onclick="filterTasks()">
                                    <i class="bi bi-search"></i> 筛选
                                </button>
                            </div>
                        </div>
                        <!-- 在状态筛选后面添加运行中任务卡片 -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <div class="card border-warning">
                                    <div class="card-header bg-warning text-dark">
                                        <h5 class="mb-0"><i class="bi bi-play-circle"></i> 正在运行的任务</h5>
                                    </div>
                                    <div class="card-body">
                                        <div id="running-tasks-list" class="row">
                                            <div class="col-12 text-center text-muted">加载中...</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead class="table-dark">
                                    <tr>
                                        <th>任务ID</th>
                                        <th>关键词</th>
                                        <th>状态</th>
                                        <th>抓取页数</th>
                                        <th>商品数量</th>
                                        <th>开始时间</th>
                                        <th>完成时间</th>
                                        <th>耗时</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="tasksTableBody">
                                    <tr><td colspan="9" class="text-center">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <!-- 分页 -->
                        <nav class="mt-3">
                            <ul class="pagination justify-content-center" id="taskPagination"></ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 任务详情模态框 -->
    <div class="modal fade" id="taskDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">任务详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="taskDetailBody">
                    加载中...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script> 
    <script src="js/sidebar.js"></script> <!-- #YU 421 -->
    <script src="js/tasks.js"></script>
</body>
</html>
