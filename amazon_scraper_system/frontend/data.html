<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据查询 - 亚马逊爬虫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">亚马逊爬虫</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
                        <li class="nav-item"><a class="nav-link" href="keywords.html"><i class="bi bi-tags"></i> 关键词管理</a></li>
                        <li class="nav-item"><a class="nav-link" href="scrape.html"><i class="bi bi-cloud-upload"></i> 爬取控制</a></li>
                        <li class="nav-item"><a class="nav-link active" href="data.html"><i class="bi bi-database"></i> 数据查询</a></li>
                        <li class="nav-item"><a class="nav-link" href="tasks.html"><i class="bi bi-list-check"></i> 任务监控</a></li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1>数据查询</h1>
                    <span id="api-status" class="badge bg-success">API 在线</span>
                </div>

                <div class="card">
                    <div class="card-header">
                        <div class="row g-3">
                            <div class="col-md-2">
                                <select class="form-select" id="filterKeyword">
                                    <option value="">全部关键词</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-select" id="filterAsin">
                                    <option value="">全部ASIN</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-select" id="filterAdType">
                                    <option value="">全部类型</option>
                                    <option value="Organic">自然商品</option>
                                    <option value="SP">SP广告</option>
                                    <option value="SB">SB广告</option>
                                    <option value="SB_Video">SB视频广告</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <input type="date" class="form-control" id="filterDate">
                            </div>
                            <div class="col-md-1">
                                <button class="btn btn-primary w-100" onclick="searchData()">
                                    <i class="bi bi-search"></i> 查询
                                </button>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-success w-100" onclick="exportData()">
                                    <i class="bi bi-download"></i> 导出CSV
                                </button>
                            </div>
                            <div class="col-md-1">
                                <button class="btn btn-secondary w-100" onclick="resetFilters()">
                                    <i class="bi bi-arrow-repeat"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>关键词</th>
                                        <th>ASIN</th>
                                        <th>标题</th>
                                        <th>价格</th>
                                        <th>评分</th>
                                        <th>评论数</th>
                                        <th>广告类型</th>
                                        <th>广告排名</th>
                                        <th>自然排名</th>
                                        <th>页码</th>
                                        <th>页面位置</th>
                                        <th>抓取时间</th>
                                    </tr>
                                </thead>
                                <tbody id="dataTableBody">
                                    <tr><td colspan="13" class="text-center">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <!-- 分页 -->
                        <nav class="mt-3">
                            <ul class="pagination justify-content-center" id="pagination"></ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
</body>
</html>
