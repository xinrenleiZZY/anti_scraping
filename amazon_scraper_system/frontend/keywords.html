<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关键词管理 - 汇挚鑫-亚马逊商品排名监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">汇挚鑫-亚马逊商品排名监控系统</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
                        <li class="nav-item"><a class="nav-link active" href="keywords.html"><i class="bi bi-tags"></i> 关键词管理</a></li>
                        <li class="nav-item"><a class="nav-link" href="scrape.html"><i class="bi bi-cloud-upload"></i> 爬取控制</a></li>
                        <li class="nav-item"><a class="nav-link" href="data.html"><i class="bi bi-database"></i> 数据查询</a></li>
                        <li class="nav-item"><a class="nav-link" href="tasks.html"><i class="bi bi-list-check"></i> 任务监控</a></li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1>关键词管理</h1>
                    <span id="api-status" class="badge bg-success">API 在线</span>
                </div>

                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <h5>关键词列表</h5>
                        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#keywordModal">
                            <i class="bi bi-plus"></i> 添加关键词
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr><th>#</th><th>关键词</th><th>操作</th></tr>
                                </thead>
                                <tbody id="keywordsTableBody">
                                    <tr><td colspan="3" class="text-center">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 添加关键词模态框 -->
    <div class="modal fade" id="keywordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">添加关键词</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control" id="newKeyword" placeholder="输入关键词，如：pool party decorations">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveKeyword">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/keywords.js"></script>
</body>
</html>
