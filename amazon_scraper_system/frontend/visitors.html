<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客记录 - 汇挚鑫-亚马逊商品排名监控系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">汇挚鑫-亚马逊商品排名监控系统</h5>
                    <ul class="nav flex-column"></ul>
                </div>
            </nav>
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1><i class="bi bi-eye"></i> 网站访客记录</h1>
                    <span id="api-status" class="badge bg-success">API 在线</span>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <div class="card text-center"><div class="card-body"><h2 class="text-primary" id="statToday">-</h2><small class="text-muted">今日访客</small></div></div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center"><div class="card-body"><h2 class="text-success" id="statWeek">-</h2><small class="text-muted">本周访客</small></div></div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center"><div class="card-body"><h2 class="text-info" id="statTotal">-</h2><small class="text-muted">总访客</small></div></div>
                    </div>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="card"><div class="card-header">热门页面 TOP10（本周）</div><div class="card-body"><div id="topPages"></div></div></div>
                    </div>
                    <div class="col-md-6">
                        <div class="card"><div class="card-header">最近访客</div><div class="card-body" style="max-height:400px;overflow-y:auto"><table class="table table-sm"><thead><tr><th>时间</th><th>页面</th><th>IP</th></tr></thead><tbody id="recentTable"></tbody></table></div></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/visitors.js"></script>
</body>
</html>
