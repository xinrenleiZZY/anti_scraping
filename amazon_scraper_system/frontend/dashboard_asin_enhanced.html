<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASIN多维分析大屏 - 汇挚鑫</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; font-family: 'Microsoft YaHei', sans-serif; color: #e2e8f0; }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .chart-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            position: relative;
        }

        .chart-title {
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #3b82f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-canvas {
            height: 300px !important;
            width: 100%;
        }

        .filter-bar {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        .asin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .asin-badge:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .asin-badge .remove-btn {
            margin-left: 8px;
            cursor: pointer;
            opacity: 0.8;
        }

        .asin-badge .remove-btn:hover {
            opacity: 1;
        }

        .chart-toggle-btn {
            background: #334155;
            border: none;
            color: #cbd5e1;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chart-toggle-btn:hover {
            background: #475569;
            color: #fff;
        }

        .settings-panel {
            position: fixed;
            right: -350px;
            top: 0;
            width: 350px;
            height: 100vh;
            background: #1e293b;
            border-left: 1px solid #334155;
            padding: 20px;
            transition: right 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .settings-panel.active {
            right: 0;
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
        }

        .settings-overlay.active {
            display: block;
        }

        .chart-option {
            background: #334155;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chart-option label {
            color: #cbd5e1;
            font-size: 13px;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: #3b82f6;
            border-color: #3b82f6;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #334155;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #3b82f6;
        }

        .stat-label {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 6px;
        }

        .ts-wrapper .ts-control {
            background: #334155 !important;
            border: 1px solid #475569 !important;
            color: #f1f5f9 !important;
        }

        .ts-dropdown {
            background: #334155 !important;
            border: 1px solid #475569 !important;
        }

        .ts-dropdown .option {
            color: #f1f5f9 !important;
        }

        .ts-dropdown .option:hover {
            background: #475569 !important;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        @media (max-width: 1200px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-2 d-md-block bg-dark sidebar">
                <div class="position-sticky pt-3">
                    <h5 class="text-white text-center py-3">汇挚鑫-亚马逊<br>商品排名监控系统</h5>
                    <ul class="nav flex-column" id="sidebarNav"></ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-10 ms-sm-auto px-md-4 py-3">
                <!-- 顶部标题栏 -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="text-white mb-0">
                        <i class="bi bi-graph-up text-primary"></i>
                        ASIN 多维分析大屏
                    </h2>
                    <div>
                        <span id="api-status" class="badge bg-secondary me-2">检测中...</span>
                        <button class="btn btn-primary btn-sm" onclick="toggleSettings()">
                            <i class="bi bi-gear"></i> 图表设置
                        </button>
                    </div>
                </div>

                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label text-white-50 small">选择ASIN（支持多选对比）</label>
                            <select id="asinSelect" multiple placeholder="输入或选择ASIN..."></select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-white-50 small">时间范围</label>
                            <select id="dateRange" class="form-select" style="background: #334155; border-color: #475569; color: #f1f5f9;">
                                <option value="7">最近7天</option>
                                <option value="14">最近14天</option>
                                <option value="30" selected>最近30天</option>
                                <option value="60">最近60天</option>
                                <option value="90">最近90天</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-3">
                        <div id="selectedAsins"></div>
                    </div>
                </div>

                <!-- 统计卡片 -->
                <div class="grid-3 mb-3" id="statsCards">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotalRecords">-</div>
                        <div class="stat-label">总记录数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statAvgRank">-</div>
                        <div class="stat-label">平均排名</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statKeywords">-</div>
                        <div class="stat-label">关键词数</div>
                    </div>
                </div>

                <!-- 图表区域 -->
                <div id="chartsContainer"></div>
            </main>
        </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="text-white mb-0"><i class="bi bi-sliders"></i> 图表配置</h5>
            <button class="btn-close btn-close-white" onclick="toggleSettings()"></button>
        </div>

        <div class="mb-3">
            <h6 class="text-white-50 small mb-2">快速模板</h6>
            <button class="btn btn-sm btn-outline-primary w-100 mb-2" onclick="applyTemplate('template1')">
                <i class="bi bi-layout-text-window"></i> 经典分析模板
            </button>
            <button class="btn btn-sm btn-outline-success w-100 mb-3" onclick="applyTemplate('template2')">
                <i class="bi bi-diagram-3"></i> 竞品对比模板
            </button>
        </div>

        <div class="mb-3">
            <h6 class="text-white-50 small mb-2">自定义图表</h6>
            <button class="btn btn-sm btn-outline-light w-100 mb-2" onclick="selectAllCharts()">全选</button>
            <button class="btn btn-sm btn-outline-light w-100" onclick="deselectAllCharts()">全不选</button>
        </div>

        <div id="chartOptions"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/dashboard_asin_enhanced.js"></script>
</body>
</html>
